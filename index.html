<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vote 2026 - Email Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            min-height: 100vh;
        }
        .candidate-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-6 md:p-12 text-white">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tight">VOTE NOW</h1>
            <p class="text-blue-300 text-lg uppercase tracking-widest">ยืนยันตัวตนผ่านอีเมลเพื่อลงคะแนน</p>
        </header>

        <div class="max-w-md mx-auto mb-12 bg-white/10 p-6 rounded-3xl border border-white/20 shadow-xl">
            <label class="block text-sm font-medium mb-2 text-blue-200">ระบุอีเมลของคุณเพื่อเริ่มลงคะแนน:</label>
            <input type="email" id="voter-email" placeholder="example@email.com" 
                   class="w-full p-4 rounded-xl bg-slate-800 border border-blue-500/50 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-slate-400 mt-2">* 1 อีเมลสามารถลงคะแนนได้เพียง 1 ครั้งเท่านั้น</p>
        </div>

        <div id="loading" class="text-center hidden">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-2 text-blue-200">กำลังประมวลผล...</p>
        </div>

        <div id="candidate-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 opacity-50 pointer-events-none">
            </div>
    </div>

    <script>
        const API_SHEET1 = "https://api.sheetbest.com/sheets/2cf0bece-6373-430b-b7dd-02239ebbb35c";
        const API_SHEET2 = "https://api.sheetbest.com/sheets/71124488-65d6-4881-867b-a4aa1295eb54";

        const emailInput = document.getElementById('voter-email');
        const candidateGrid = document.getElementById('candidate-list');

        // ตรวจสอบการกรอกอีเมลเพื่อปลดล็อคปุ่มโหวต
        emailInput.addEventListener('input', (e) => {
            if(e.target.value.includes('@') && e.target.value.includes('.')) {
                candidateGrid.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                candidateGrid.classList.add('opacity-50', 'pointer-events-none');
            }
        });

        async function loadCandidates() {
            try {
                const response = await fetch(API_SHEET1);
                const data = await response.json();
                const container = document.getElementById('candidate-list');
                container.innerHTML = '';

                data.forEach((item, index) => {
                    container.innerHTML += `
                        <div class="candidate-card rounded-3xl p-6 flex flex-col items-center shadow-2xl">
                            <img src="${item.ImageURL}" class="w-32 h-32 rounded-full object-cover mb-4 border-4 border-blue-500/30">
                            <h3 class="text-xl font-bold mb-1">เบอร์ ${item.ID}: ${item.Name}</h3>
                            <button onclick="checkAndVote(${item.ID}, ${item.ผลคะแนนทดลอง || 0}, ${index}, this)" 
                                    class="w-full mt-4 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-500 transition-all active:scale-95">
                                ลงคะแนน
                            </button>
                        </div>
                    `;
                });
            } catch (error) { console.error(error); }
        }

        async function checkAndVote(id, currentVotes, rowIndex, btn) {
            const email = emailInput.value.trim().toLowerCase();
            
            if (!email) {
                alert("กรุณากรอกอีเมลก่อนลงคะแนน");
                return;
            }

            if (!confirm(`ยืนยันการลงคะแนนให้เบอร์ ${id}?`)) return;

            btn.disabled = true;
            btn.innerHTML = "กำลังตรวจสอบ...";
            document.getElementById('loading').classList.remove('hidden');

            try {
                // 1. ตรวจสอบใน Sheet 2 ว่าอีเมลนี้โหวตไปหรือยัง
                const checkRes = await fetch(`${API_SHEET2}/Email/${email}`);
                const existingVote = await checkRes.json();

                if (existingVote.length > 0) {
                    alert("ขออภัย: อีเมลนี้ได้ใช้สิทธิ์ลงคะแนนไปแล้ว");
                    document.getElementById('loading').classList.add('hidden');
                    btn.disabled = false;
                    btn.innerHTML = "ลงคะแนน";
                    return;
                }

                // 2. ถ้ายังไม่เคยโหวต -> บันทึก Log (Sheet 2)
                await fetch(API_SHEET2, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Timestamp: new Date().toLocaleString('th-TH'),
                        CandidateID: id,
                        Email: email
                    })
                });

                // 3. อัปเดตคะแนน (Sheet 1)
                await fetch(`${API_SHEET1}/${rowIndex}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Votes: parseInt(currentVotes) + 1
                    })
                });

                alert("ลงคะแนนสำเร็จ! ขอบคุณที่ร่วมใช้สิทธิ์");
                location.reload(); 
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
                console.error(err);
            }
        }

        loadCandidates();
    </script>
</body>
</html>
